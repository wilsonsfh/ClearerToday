<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Body: upright -->
  <ellipse cx="60" cy="75" rx="30" ry="28" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <!-- Head -->
  <circle cx="60" cy="44" r="28" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <!-- Eyes: focused narrow -->
  <rect x="44" y="40" width="12" height="4" rx="2" fill="#F59E0B"/>
  <rect x="64" y="40" width="12" height="4" rx="2" fill="#F59E0B"/>
  <!-- Determined brows -->
  <line x1="44" y1="35" x2="56" y2="37" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="37" x2="76" y2="35" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <!-- Mouth: tight line -->
  <line x1="52" y1="55" x2="68" y2="55" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Target icon -->
  <circle cx="95" cy="20" r="8" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
  <circle cx="95" cy="20" r="4" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
  <circle cx="95" cy="20" r="1.5" fill="#F59E0B"/>
</svg>
